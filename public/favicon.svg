<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Understudy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20222c"/>
      <stop offset="1" stop-color="#0e0f13"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0c07a"/>
      <stop offset="1" stop-color="#c9924a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Half-lit disc: the "understudy" learning the other half of the scene -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#3a3e4d" stroke-width="20"/>
  <path d="M256 106 A150 150 0 0 1 256 406 Z" fill="url(#amber)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#amber)" stroke-width="20"/>
</svg>

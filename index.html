<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0f13" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f3ee" />
    <!-- Defence-in-depth: blocks remote scripts/objects and non-HTTPS egress.
         connect-src stays broad ('https:') because vendor hosts vary by region
         and users may configure their own relay — the privacy guarantee lives
         in the application code, not this policy. 'unsafe-inline' script is
         required by the theme bootstrap below and Vite's dev preamble. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self' data:; connect-src 'self' https: wss: data: blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('understudy-theme') || 'system'
          var d = t === 'light' || t === 'dark' ? t : matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = d
          document.documentElement.style.colorScheme = d
        } catch (e) {}
      })()
    </script>
    <meta
      name="description"
      content="Understudy — an offline TTS scene partner that performs the other characters, waits for your lines, and scores them in real time."
    />
    <meta property="og:title" content="Understudy — Line Rehearsal" />
    <meta
      property="og:description"
      content="An offline scene partner that performs the other characters, waits for your lines, and scores them in real time."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <title>Understudy — Line Rehearsal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
